server:
  port: 8083
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fitmedia-recommendation-db
    username: postgres
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    non-secure-port: 8083
    prefer-ip-address: false
    instance-id: localhost:${spring.application.name}:${server.port}
rabbitmq:
  exchange:
    name: fitmedia.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking
gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}