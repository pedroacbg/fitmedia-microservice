server:
  port: 8082
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fitmedia-activity-db
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
    non-secure-port: 8082
    prefer-ip-address: false
    instance-id: localhost:${spring.application.name}:${server.port}
rabbitmq:
  exchange:
    name: fitmedia.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking
